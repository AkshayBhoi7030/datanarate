name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Linting and Testing
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with Black
        working-directory: backend
        run: black --check .

      - name: Lint with isort
        working-directory: backend
        run: isort --check .

      - name: Lint with flake8
        working-directory: backend
        run: flake8 .

      - name: Run unit tests
        working-directory: backend
        run: python -m pytest tests/test_sql_validator.py tests/test_services.py tests/test_repositories.py tests/test_health.py -v -p no:flask

  # Frontend Linting and Testing
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
